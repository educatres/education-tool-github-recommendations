name: 說人話 speak-human-tw
description: 繁體中文台灣語境的去 AI 味改寫 Skill，協助找出 AI 寫作痕跡並提出更自然的改稿建議。
educatorSummary: |
  說人話 speak-human-tw 是一個給 Claude Code、Codex、Cursor 與其他 AI agent 使用的繁體中文改稿 Skill，核心目標不是代寫，而是校對已存在的文字，抓出 AI 常見寫作痕跡、中國用語、半形標點與過度模板化的表達。它內建 35 種以上 AI 中文寫作痕跡、台灣在地化用語檢查、保護清單與誤殺防護，並採取先列問題、再由作者決定是否套用的工作流。適合研究生、教師與學術寫作者用來檢查 AI 輔助撰寫後的摘要、報告、投稿信、研究推廣文或課程公告，但最後的立場、經驗與語氣仍應由作者本人補回。
authorName: Raymondhou0917
authorGitHub: Raymondhou0917
