educationLevels:
  - 研究
useCases:
  - 在研究寫作或 AI 素養課程中示範如何辨識 AI 腔、模板句與空泛論述
  - 協助學生檢查 AI 輔助生成的報告、摘要或簡報文字，保留事實並修正不自然表達
  - 作為繁體中文台灣用語、標點與改稿流程的範例，討論人機協作中的作者責任
cautions:
  - 工具定位是校對與改稿建議，不應替學生或研究者產生不存在的經驗、立場或故事
  - 去 AI 味不等於提高內容品質，事實查核、論證強度與研究倫理仍需另外檢查
  - 改稿建議可能不符合作者個人風格，正式交付前應由作者逐條取捨與人工確認
language: Markdown
install: |
  Claude Code 可將 repository clone 到 ~/.claude/skills/speak-human-tw；Codex 可 clone 專案後用 codex exec -C . 讀取 SKILL.md 並貼上要改寫的文字；Cursor 與其他平台可依 install/ 目錄文件設定。若只想先看問題不要直接改稿，可在指令中要求「先標問題不要改」。
