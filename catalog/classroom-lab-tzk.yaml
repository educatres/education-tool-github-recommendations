name: Classroom Lab tzk
description: 以 GitHub Pages 發布的純前端互動教學工具集。根目錄 index.html 是所有工具的入口；各項實驗則以獨立子資料夾維護，方便持續加入新的課堂功能。
educatorSummary: |
  以 GitHub Pages 發布的純前端互動教學工具集。根目錄 index.html 是所有工具的入口；各項實驗則以獨立子資料夾維護，方便持續加入新的課堂功能。 教育工作者可先從 README 的使用流程與限制開始評估，確認課堂情境、學生資料與校內資訊安全規範都適合後再導入。
authorName: kisaraki
authorGitHub: kisaraki
