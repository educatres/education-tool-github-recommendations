educationLevels:
  - 中小學
useCases:
  - 課前評估工具功能是否符合課程需求
  - 作為課堂活動、教學管理或學習輔助的候選工具
  - 搭配 GitHub README 與原始碼了解部署方式
cautions:
  - 正式使用前請先小規模測試
  - 若涉及學生資料或影像，需確認同意、隱私與校內規範
  - GitHub stars 僅作為社群參考，不代表教學品質保證
language: JavaScript
