educationLevels:
  - 研究
useCases:
  - 檢查 AI 生成報告或論文章節中的參考文獻是否包含幻覺文獻
  - 在論文、研究計畫或專題報告送出前，逐筆核對引用清單與 DOI
  - 搭配研究方法課程，示範如何判讀查無、欄位不一致與資料庫索引限制
cautions:
  - 查無結果不一定代表文獻不存在，可能是未索引、新刊、預印本、付費牆或冷門來源
  - 標示為資訊不完整或有出入的條目，仍需研究者親自開啟 DOI、PubMed 或 Google Scholar 連結抽查
  - 工具只能協助確認書目真實性與欄位一致性，不能替研究品質、論證強度或引用適切性背書
language: Python
install: |
  將 reference-verifier/ 放到支援 Skills 的目錄中，例如 Claude 的 /mnt/skills/user/reference-verifier/、Antigravity 的 ~/.gemini/antigravity/skills/reference-verifier/，或專案內的 .agents/skills/reference-verifier/。使用時貼上參考文獻清單，選擇 PubMed、Google Scholar 或兩者皆用，再依需要指定摘要清單欄位。
