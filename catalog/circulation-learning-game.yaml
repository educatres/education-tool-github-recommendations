educationLevels:
  - 中小學
useCases:
  - 在國中自然科或生物課中比較閉鎖式循環、開放式循環與昆蟲氣管系統的功能差異
  - 讓學生操作體型、活動強度與氧氣濃度滑桿，推論供氧效率與身體大小之間的關係
  - 透過路線排序、巨型昆蟲設計與測驗題，引導學生用證據解釋生物構造的限制與適應
cautions:
  - 本教材中的秒數、效率與缺氧比例是教學用簡化模型，不代表特定物種或人體的真實測量結果
  - 教師應提醒學生，昆蟲是由氣管系統主要負責送氧，血淋巴仍有運送養分、代謝物與其他生理功能
  - 延伸討論史前巨型昆蟲時，建議同時處理環境氧氣、外骨骼、捕食者、競爭與演化壓力等多重因素
language: CSS
install: |
  可直接開啟 GitHub Pages 線上版本使用。若要本機測試，可下載或 clone 專案後直接用瀏覽器開啟 index.html；也可以在專案資料夾執行 python3 -m http.server 8000，再開啟 http://localhost:8000。
