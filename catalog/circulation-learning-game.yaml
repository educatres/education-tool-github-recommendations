name: 循環大挑戰｜人類與昆蟲的送氧比較
description: 國中生物互動教材，透過動畫、滑桿實驗、路線挑戰與測驗，比較人類閉鎖式循環與昆蟲開放式循環。
educatorSummary: |
  循環大挑戰是一套可直接部署到 GitHub Pages 的生物互動教材，主題聚焦在人類閉鎖式循環與昆蟲開放式循環、氣管系統的送氧方式比較。學生可在概念動畫中並排觀察人類由肺、紅血球、心臟與血管運送氧氣，以及昆蟲由氣門、氣管與微氣管讓氧氣接近細胞的路線；也能在體型實驗室調整體型大小、活動強度與環境氧氣濃度，觀察供氧效率、模擬送氧時間與缺氧細胞比例的變化。工具另外提供人類與昆蟲送氧路線挑戰、巨型昆蟲設計任務、五題即時解說測驗與史前巨型昆蟲延伸資源，適合用來引導學生比較不同循環與呼吸構造如何配合體型、活動需求與環境條件。
authorName: educatres
authorGitHub: educatres
