educationLevels:
  - 中小學
useCases:
  - 在國中自然科或高中生物課中比較有絲分裂與減數分裂的目的、子細胞數量、染色體數目與遺傳差異
  - 透過染色體數目模擬器釐清 DNA 複製後染色體數不一定加倍、第一次分開的是同源染色體或姐妹染色分體等迷思
  - 使用科學家小傳、經典實驗、即時練習與五款遊戲，設計分組輪站、課堂討論或形成性評量活動
cautions:
  - 外部 YouTube 影片與 Wikimedia Commons 圖片各有來源與授權，教師正式使用前應確認影片可播放、字幕與內容適合班級
  - 遊戲星星進度保存在學生自己的瀏覽器 localStorage，不會形成可集中收回的班級成績資料
  - 若用於正式評量，建議要求學生用染色體行為解釋答案，避免只背階段名稱或把有絲分裂、減數分裂流程混用
language: JavaScript
install: |
  可直接開啟 GitHub Pages 線上版本使用。若要本機測試，可下載或 clone 專案後直接用瀏覽器開啟 index.html；若瀏覽器限制本機功能，也可以在專案資料夾執行 python3 -m http.server 8000，再開啟 http://localhost:8000。
