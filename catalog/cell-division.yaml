name: 細胞分裂研究所｜有絲分裂 × 減數分裂互動教材
description: 國高中生物互動教材，整合細胞分裂科學史、經典實驗、理論比較、染色體數目模擬、練習題與闖關遊戲。
educatorSummary: |
  細胞分裂研究所是一套可部署到 GitHub Pages 的繁體中文純前端互動教材，主題聚焦在有絲分裂、減數分裂與染色體行為。教材從華爾瑟・弗萊明、華特・薩頓、西奧多・博韋里、哈麗特・克萊頓與芭芭拉・麥克林托克等科學史切入，搭配蠑螈細胞染色、洋蔥根尖觀察、蚱蜢減數分裂與玉米染色體互換等經典實驗，協助學生理解證據如何建立。網站也提供有絲分裂與減數分裂理論切換、比較表、常見迷思、染色體數目與 DNA 分子數模擬器、12 題即時回饋練習，以及「階段排排站」「染色體調度員」「互換實驗室」「分裂錯誤偵探」「細胞密室逃脫」五款小遊戲，適合用來把階段背誦轉化為染色體分配、遺傳多樣性與錯誤判讀的探究活動。
authorName: educatres
authorGitHub: educatres
repo: educatres/cell-division
