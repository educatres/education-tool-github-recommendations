name: 世界同一刻-1945
description: 1915 到 1975 年三洲同步互動歷史時間軸，協助學生比較亞洲、歐洲與美洲的戰爭、政治與政經轉折。
educatorSummary: |
  世界同一刻-1945 是一套可部署到 GitHub Pages 的純前端互動歷史教材，以 1915 到 1975 年為範圍，讓學生在同一螢幕中同步比較亞洲、歐洲與美洲的重要事件、政治領導人、重要人物與政經議題。教材提供三條水平分色時間軸、年份滑桿、拖曳與鍵盤操作、分類篩選、右側常駐事件詳述，以及每年自動產生的三洲年度快照與課堂提問。點選事件卡後，學生可閱讀事件摘要、人物與政經脈絡、影響重點、文字資料來源、Wikimedia Commons 公開圖像與 YouTube 說明影片。它適合用於國中歷史或社會課，幫助學生把二戰前後、冷戰初期、去殖民化與區域政經變動放在「同一年不同地區」的比較架構中理解。
authorName: educatres
