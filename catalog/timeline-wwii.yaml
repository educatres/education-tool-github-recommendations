educationLevels:
  - 中小學
  - 高中
useCases:
  - 在國中歷史或社會課中比較 1915 到 1975 年亞洲、歐洲與美洲同一年份的戰爭、政治與政經事件
  - 透過年度快照與課堂提問，引導學生討論二戰結束、冷戰形成、去殖民化與區域秩序重組之間的關係
  - 使用圖像、影片、事件詳述與來源連結，練習區分史實、解釋、觀點與評價
cautions:
  - 本教材以跨區同步比較為核心，單一事件不宜被解釋成只有一個原因，建議搭配原始史料與課本脈絡討論
  - Wikimedia Commons 圖像與 YouTube 影片來自外部來源，正式授課前應確認連結可用、內容適齡且授權標示清楚
  - 時間軸摘要會壓縮事件複雜性，若用於評量，建議要求學生引用事件卡資料並說明因果關係
language: JavaScript
install: |
  可直接開啟 GitHub Pages 線上版本使用。若要本機測試，下載或 clone 專案後可直接用瀏覽器開啟 index.html；專案為純 HTML、CSS、JavaScript，無需帳號、資料庫或建置工具，也可用 python3 -m http.server 8000 啟動靜態伺服器後開啟 http://localhost:8000。
